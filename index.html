<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Margin6 — Know your margin. Every day.</title>
    <meta name="title" content="Margin6 — Know your margin. Every day." />
    <meta name="description" content="Find out exactly how much money your restaurant lost this week. No POS required. Live in 10 minutes. Free 14-day trial." />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://margin6.com/" />
    <meta property="og:title" content="Margin6 — Know your margin. Every day." />
    <meta property="og:description" content="Find out exactly how much money your restaurant lost this week. No POS required. Live in 10 minutes. Free 14-day trial." />
    <meta property="og:image" content="https://margin6.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Margin6" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://margin6.com/" />
    <meta property="twitter:title" content="Margin6 — Know your margin. Every day." />
    <meta property="twitter:description" content="Find out exactly how much money your restaurant lost this week. No POS required. Live in 10 minutes. Free 14-day trial." />
    <meta property="twitter:image" content="https://margin6.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // If the Vite main module or a chunk 404s, `main.tsx` never runs; surface that instead of a white screen.
      window.addEventListener(
        "error",
        (e) => {
          const t = e && e.target;
          if (t && t instanceof HTMLScriptElement && t.src) {
            const r = document.getElementById("root");
            if (r) {
              r.replaceChildren();
              const p = document.createElement("p");
              p.setAttribute("style", "font-family: system-ui, sans-serif; padding: 24px; max-width: 40rem; margin: 0 auto;");
              p.textContent =
                "Could not load a script. Check the Network tab and that the dev server is running (npm run dev). " +
                t.src;
              r.appendChild(p);
            }
          }
        },
        true,
      );
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
